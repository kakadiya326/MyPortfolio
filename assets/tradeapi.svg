<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient Purple-Teal -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Abstract Server Nodes Connecting -->
  <g opacity="0.1">
    <circle cx="200" cy="150" r="40" fill="none" stroke="#06b6d4" stroke-width="1.5" />
    <circle cx="200" cy="150" r="6" fill="#06b6d4" />
    <circle cx="600" cy="300" r="40" fill="none" stroke="#8b5cf6" stroke-width="1.5" />
    <circle cx="600" cy="300" r="6" fill="#8b5cf6" />
    <line x1="240" y1="150" x2="560" y2="300" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,5" />
  </g>

  <!-- Glowing background aura -->
  <circle cx="450" cy="200" r="140" fill="#06b6d4" opacity="0.08" filter="blur(70px)"/>
  <circle cx="350" cy="250" r="110" fill="#8b5cf6" opacity="0.08" filter="blur(60px)"/>

  <!-- Window Container -->
  <rect x="150" y="80" width="500" height="290" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Window Header -->
  <line x1="150" y1="130" x2="650" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <circle cx="180" cy="105" r="5" fill="#ef4444" />
  <circle cx="196" cy="105" r="5" fill="#eab308" />
  <circle cx="212" cy="105" r="5" fill="#22c55e" />
  <rect x="250" y="98" width="120" height="14" rx="7" fill="rgba(255,255,255,0.05)" />
  <text x="310" y="109" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">trade-opps-api</text>

  <!-- AI & FastAPI UI mockups -->
  <!-- API endpoints panel (left side) -->
  <rect x="180" y="150" width="180" height="195" rx="10" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(255,255,255,0.05)" />
  <!-- GET tag -->
  <rect x="195" y="165" width="40" height="18" rx="4" fill="#06b6d4" opacity="0.2" />
  <text x="215" y="178" font-family="sans-serif" font-weight="bold" font-size="9" fill="#06b6d4" text-anchor="middle">GET</text>
  <rect x="245" y="170" width="100" height="8" rx="4" fill="var(--text-primary)" />
  
  <!-- POST tag -->
  <rect x="195" y="195" width="40" height="18" rx="4" fill="#10b981" opacity="0.2" />
  <text x="215" y="208" font-family="sans-serif" font-weight="bold" font-size="9" fill="#10b981" text-anchor="middle">POST</text>
  <rect x="245" y="200" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  
  <!-- Sector selection UI -->
  <rect x="195" y="235" width="150" height="30" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
  <text x="210" y="254" font-family="monospace" font-size="10" fill="#a855f7">/analyze/tech</text>
  
  <!-- Run / execute visual -->
  <rect x="195" y="280" width="150" height="25" rx="6" fill="url(#accentGrad)" opacity="0.9" />
  <text x="270" y="296" font-family="sans-serif" font-weight="600" font-size="10" fill="#fff" text-anchor="middle">Execute AI Analysis</text>

  <!-- AI Response panel (right side) -->
  <rect x="380" y="150" width="250" height="195" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
  <circle cx="410" cy="175" r="12" fill="rgba(139, 92, 246, 0.15)" />
  <!-- Gemini star icon -->
  <path d="M410 168 L412 173 L417 175 L412 177 L410 182 L408 177 L403 175 L408 173 Z" fill="#8b5cf6" />
  
  <rect x="435" y="170" width="100" height="10" rx="5" fill="#8b5cf6" opacity="0.8" />
  <line x1="395" y1="200" x2="615" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" />
  
  <!-- Markdown output snippet -->
  <rect x="395" y="215" width="220" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <rect x="395" y="235" width="190" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <rect x="395" y="255" width="205" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  
  <!-- Sector opportunities highlight -->
  <rect x="395" y="280" width="220" height="50" rx="8" fill="rgba(6, 182, 212, 0.05)" stroke="rgba(6, 182, 212, 0.15)" />
  <rect x="410" y="292" width="140" height="8" rx="4" fill="#06b6d4" />
  <rect x="410" y="310" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)" />

</svg>
