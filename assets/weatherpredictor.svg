<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient Orange-Teal -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Abstract Graph Lines and Chart Grid -->
  <g opacity="0.08">
    <line x1="100" y1="350" x2="700" y2="350" stroke="#f97316" stroke-width="2" />
    <line x1="100" y1="100" x2="100" y2="350" stroke="#f97316" stroke-width="2" />
    <line x1="200" y1="100" x2="200" y2="350" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="300" y1="100" x2="300" y2="350" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="400" y1="100" x2="400" y2="350" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="500" y1="100" x2="500" y2="350" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="600" y1="100" x2="600" y2="350" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" />
  </g>

  <!-- Glowing background aura -->
  <circle cx="500" cy="200" r="130" fill="#f97316" opacity="0.08" filter="blur(65px)"/>
  <circle cx="300" cy="220" r="110" fill="#06b6d4" opacity="0.08" filter="blur(60px)"/>

  <!-- Window Container -->
  <rect x="150" y="80" width="500" height="290" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Window Header -->
  <line x1="150" y1="130" x2="650" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <circle cx="180" cy="105" r="5" fill="#ef4444" />
  <circle cx="196" cy="105" r="5" fill="#eab308" />
  <circle cx="212" cy="105" r="5" fill="#22c55e" />
  <rect x="250" y="98" width="130" height="14" rx="7" fill="rgba(255,255,255,0.05)" />

  <!-- Data Science / Regression chart -->
  <!-- Left Side: Weather inputs -->
  <rect x="180" y="150" width="160" height="195" rx="10" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(255,255,255,0.05)" />
  
  <text x="195" y="175" font-family="sans-serif" font-weight="600" font-size="10" fill="#f97316">Parameters</text>
  
  <rect x="195" y="195" width="130" height="22" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
  <text x="205" y="210" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Temp: 28°C</text>

  <rect x="195" y="227" width="130" height="22" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
  <text x="205" y="242" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Wind: 14 km/h</text>

  <rect x="195" y="259" width="130" height="22" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
  <text x="205" y="274" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Pressure: 1012 hPa</text>
  
  <!-- Predict Button -->
  <rect x="195" y="295" width="130" height="25" rx="6" fill="url(#accentGrad)" />
  <text x="260" y="311" font-family="sans-serif" font-weight="600" font-size="9" fill="#fff" text-anchor="middle">Predict Humidity</text>

  <!-- Right Side: Regression Scatter and Fit Line -->
  <rect x="360" y="150" width="270" height="195" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
  
  <!-- Scatter Dots -->
  <circle cx="390" cy="300" r="4" fill="#06b6d4" />
  <circle cx="420" cy="270" r="4" fill="#06b6d4" />
  <circle cx="450" cy="220" r="4" fill="#06b6d4" />
  <circle cx="470" cy="240" r="4" fill="#06b6d4" />
  <circle cx="510" cy="190" r="4" fill="#06b6d4" />
  <circle cx="550" cy="180" r="4" fill="#06b6d4" />
  <circle cx="580" cy="160" r="4" fill="#06b6d4" />
  <circle cx="600" cy="130" r="4" fill="#06b6d4" />

  <!-- Fit Line -->
  <line x1="375" y1="315" x2="615" y2="120" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Model validation badge -->
  <rect x="535" y="305" width="80" height="25" rx="12" fill="rgba(249, 115, 22, 0.1)" stroke="rgba(249, 115, 22, 0.3)" />
  <text x="575" y="321" font-family="monospace" font-size="9" font-weight="bold" fill="#f97316" text-anchor="middle">R² = 0.94</text>

</svg>
