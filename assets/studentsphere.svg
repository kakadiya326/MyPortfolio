<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient Indigo-Teal -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Abstract Grid/Dot Matrix Pattern for Tech Vibe -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="2" fill="#6366f1" />
    <circle cx="200" cy="100" r="2" fill="#6366f1" />
    <circle cx="300" cy="100" r="2" fill="#6366f1" />
    <circle cx="400" cy="100" r="2" fill="#6366f1" />
    <circle cx="500" cy="100" r="2" fill="#6366f1" />
    <circle cx="600" cy="100" r="2" fill="#6366f1" />
    <circle cx="700" cy="100" r="2" fill="#6366f1" />
    
    <circle cx="100" cy="200" r="2" fill="#6366f1" />
    <circle cx="200" cy="200" r="2" fill="#6366f1" />
    <circle cx="300" cy="200" r="2" fill="#6366f1" />
    <circle cx="400" cy="200" r="2" fill="#6366f1" />
    <circle cx="500" cy="200" r="2" fill="#6366f1" />
    <circle cx="600" cy="200" r="2" fill="#6366f1" />
    <circle cx="700" cy="200" r="2" fill="#6366f1" />
    
    <circle cx="100" cy="350" r="2" fill="#6366f1" />
    <circle cx="200" cy="350" r="2" fill="#6366f1" />
    <circle cx="300" cy="350" r="2" fill="#6366f1" />
    <circle cx="400" cy="350" r="2" fill="#6366f1" />
    <circle cx="500" cy="350" r="2" fill="#6366f1" />
    <circle cx="600" cy="350" r="2" fill="#6366f1" />
    <circle cx="700" cy="350" r="2" fill="#6366f1" />
  </g>

  <!-- Glowing background aura -->
  <circle cx="400" cy="225" r="150" fill="#6366f1" opacity="0.1" filter="blur(50px)"/>
  <circle cx="500" cy="250" r="100" fill="#14b8a6" opacity="0.1" filter="blur(40px)"/>

  <!-- Main Dashboard Glass Window -->
  <rect x="150" y="80" width="500" height="290" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Window Top Bar -->
  <line x1="150" y1="120" x2="650" y2="120" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <circle cx="180" cy="100" r="5" fill="#ef4444" />
  <circle cx="196" cy="100" r="5" fill="#eab308" />
  <circle cx="212" cy="100" r="5" fill="#22c55e" />
  <rect x="250" y="93" width="150" height="14" rx="7" fill="rgba(255,255,255,0.05)" />

  <!-- Sidebar layout -->
  <rect x="170" y="140" width="110" height="210" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" />
  <rect x="185" y="155" width="80" height="10" rx="5" fill="#6366f1" opacity="0.8" />
  <rect x="185" y="180" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <rect x="185" y="200" width="70" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <rect x="185" y="220" width="50" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  
  <!-- Main Grid Content -->
  <!-- Left Header -->
  <rect x="300" y="140" width="200" height="15" rx="7" fill="url(#accentGrad)" />
  <rect x="300" y="165" width="330" height="8" rx="4" fill="rgba(255,255,255,0.2)" />

  <!-- Course Card 1 -->
  <rect x="300" y="195" width="330" height="65" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" />
  <rect x="315" y="210" width="35" height="35" rx="6" fill="#6366f1" opacity="0.2" />
  <!-- Graduation cap inside box -->
  <path d="M322 225 L332.5 218 L343 225 L332.5 232 Z" fill="#6366f1" />
  <path d="M326.5 228 L326.5 234 Q332.5 238 338.5 234 L338.5 228" fill="none" stroke="#6366f1" stroke-width="1.5" />
  
  <rect x="365" y="210" width="120" height="12" rx="6" fill="var(--text-primary)" />
  <rect x="365" y="230" width="70" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  
  <!-- Progress Ring/Circle -->
  <circle cx="590" cy="227" r="18" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
  <path d="M590 209 A18 18 0 1 1 573.5 234" fill="none" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" />
  <text x="590" y="231" font-family="sans-serif" font-size="9" font-weight="bold" fill="#14b8a6" text-anchor="middle">75%</text>

  <!-- Course Card 2 -->
  <rect x="300" y="275" width="330" height="65" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" />
  <rect x="315" y="290" width="35" height="35" rx="6" fill="#14b8a6" opacity="0.2" />
  <!-- Code bracket icon -->
  <path d="M325 303 L320 307 L325 311 M340 303 L345 307 L340 311" fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <rect x="365" y="290" width="150" height="12" rx="6" fill="var(--text-primary)" />
  <rect x="365" y="310" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)" />

  <circle cx="590" cy="307" r="18" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
  <path d="M590 289 A18 18 0 0 1 607.5 313" fill="none" stroke="#6366f1" stroke-width="4" stroke-linecap="round" />
  <text x="590" y="311" font-family="sans-serif" font-size="9" font-weight="bold" fill="#6366f1" text-anchor="middle">45%</text>

</svg>
