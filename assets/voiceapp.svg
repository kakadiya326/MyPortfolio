<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient Purple-Violet -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Abstract Audio Sine Waves -->
  <path d="M 50,225 Q 120,100 200,225 T 350,225 T 500,225 T 650,225 T 750,225" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.1" />
  <path d="M 50,225 Q 150,320 250,225 T 450,225 T 650,225 T 750,225" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.08" />

  <!-- Glowing background aura -->
  <circle cx="400" cy="225" r="140" fill="#a855f7" opacity="0.08" filter="blur(65px)"/>
  <circle cx="330" cy="200" r="100" fill="#6366f1" opacity="0.08" filter="blur(60px)"/>

  <!-- Window Container -->
  <rect x="150" y="80" width="500" height="290" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Window Header -->
  <line x1="150" y1="130" x2="650" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <circle cx="180" cy="105" r="5" fill="#ef4444" />
  <circle cx="196" cy="105" r="5" fill="#eab308" />
  <circle cx="212" cy="105" r="5" fill="#22c55e" />
  <rect x="250" y="98" width="110" height="14" rx="7" fill="rgba(255,255,255,0.05)" />

  <!-- Voice recognition UI components -->
  <!-- Microphone Visual (Center Left) -->
  <g transform="translate(190, 150)">
    <rect x="20" y="10" width="30" height="60" rx="15" fill="url(#accentGrad)" />
    <path d="M10,40 A40,40 0 0,0 60,40" fill="none" stroke="#a855f7" stroke-width="4" stroke-linecap="round" />
    <line x1="35" y1="80" x2="35" y2="100" stroke="#a855f7" stroke-width="4" />
    <line x1="20" y1="100" x2="50" y2="100" stroke="#a855f7" stroke-width="4" stroke-linecap="round" />
    
    <!-- Pulse Rings around mic -->
    <circle cx="35" cy="40" r="45" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3" />
    <circle cx="35" cy="40" r="55" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="6,6" opacity="0.2" />
  </g>

  <!-- Output Text Lines (Center Right) -->
  <g transform="translate(300, 160)">
    <rect x="0" y="5" width="310" height="12" rx="6" fill="var(--text-primary)" />
    <rect x="0" y="28" width="280" height="12" rx="6" fill="var(--text-primary)" />
    <rect x="0" y="51" width="300" height="12" rx="6" fill="var(--text-primary)" />
    <rect x="0" y="74" width="220" height="12" rx="6" fill="var(--text-primary)" opacity="0.8" />
    
    <!-- Cursor -->
    <rect x="225" y="72" width="2" height="15" fill="#a855f7" opacity="0.8" />
    
    <rect x="0" y="110" width="100" height="25" rx="12" fill="#a855f7" opacity="0.2" stroke="rgba(168, 85, 247, 0.4)" stroke-width="1" />
    <rect x="25" y="118.5" width="50" height="8" rx="4" fill="#a855f7" />
  </g>

</svg>
