<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Concentric Map Circles (Abstract Radar Layout) -->
  <g opacity="0.1">
    <circle cx="400" cy="225" r="100" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <circle cx="400" cy="225" r="180" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="8,8" />
    <circle cx="400" cy="225" r="260" fill="none" stroke="#60a5fa" stroke-width="1.5" />
  </g>

  <!-- Glowing background aura -->
  <circle cx="400" cy="225" r="120" fill="#3b82f6" opacity="0.12" filter="blur(60px)"/>

  <!-- Window Container -->
  <rect x="150" y="80" width="500" height="290" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Window Header -->
  <line x1="150" y1="130" x2="650" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <circle cx="180" cy="105" r="5" fill="#ef4444" />
  <circle cx="196" cy="105" r="5" fill="#eab308" />
  <circle cx="212" cy="105" r="5" fill="#22c55e" />
  <rect x="250" y="98" width="130" height="14" rx="7" fill="rgba(255,255,255,0.05)" />

  <!-- Search Filter Interface Mockup -->
  <!-- Search Input -->
  <rect x="180" y="150" width="440" height="30" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" />
  <rect x="195" y="161" width="120" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <circle cx="595" cy="165" r="6" fill="none" stroke="#60a5fa" stroke-width="1.5" />
  <line x1="599" y1="169" x2="605" y2="175" stroke="#60a5fa" stroke-width="1.5" />

  <!-- Map UI Layout (Right Side) -->
  <rect x="380" y="195" width="240" height="150" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" />
  <!-- Abstract Map Roads -->
  <path d="M380 230 H620 M380 300 H620 M440 195 V345 M550 195 V345" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="none" />
  <!-- Glowing Map Pin -->
  <path d="M495 240 C485 240 480 248 495 265 C510 248 505 240 495 240 Z" fill="url(#accentGrad)" />
  <circle cx="495" cy="247" r="3" fill="#fff" />
  <circle cx="495" cy="265" r="8" fill="#60a5fa" opacity="0.3" />

  <!-- Hostel Item Cards (Left Side) -->
  <!-- Hostel Card 1 -->
  <rect x="180" y="195" width="180" height="65" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" />
  <rect x="195" y="210" width="40" height="35" rx="4" fill="rgba(255,255,255,0.03)" />
  <!-- House visual icon inside small box -->
  <path d="M205 230 V220 L215 214 L225 220 V230 Z" fill="none" stroke="#60a5fa" stroke-width="1.5" />
  
  <rect x="250" y="210" width="90" height="10" rx="5" fill="var(--text-primary)" />
  <rect x="250" y="228" width="50" height="8" rx="4" fill="rgba(255,255,255,0.2)" />

  <!-- Hostel Card 2 -->
  <rect x="180" y="280" width="180" height="65" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" />
  <rect x="195" y="295" width="40" height="35" rx="4" fill="rgba(255,255,255,0.03)" />
  <path d="M205 315 V305 L215 299 L225 305 V315 Z" fill="none" stroke="#60a5fa" stroke-width="1.5" />
  
  <rect x="250" y="295" width="80" height="10" rx="5" fill="var(--text-primary)" />
  <rect x="250" y="313" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)" />

</svg>
